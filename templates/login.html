<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        h1{
            margin-bottom: 20px;
        }
        body{
            padding: 20px;
            height: 100vh;
            justify-items: center;
            align-content: center;
            background-color: rgb(255, 197, 221);

        }
        form{
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 20%;
            gap: 10px;
        }
        input{
            padding-left: 5px;
            padding: 5px;
        }
        button{
            margin-top: 10px;
            padding: 5px;
            border: none;
            border-radius: 5px;
            background-color: rgb(255, 63, 143);
            color: white;
        }

    </style>
</head>
<body>
    <h1>LOGIN</h1>
    <form action="/login", method="post">
        <label>Nome:</label>
        <input type="text" name="usuario">
        
        <label>Senha:</label>
        <input type="password" name="senha">

        <button type="submit">Enviar</button>
        <button type="button">Cadastre-se</button>
    </form>
</body>
</html>
